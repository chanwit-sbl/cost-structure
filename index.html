<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Structure ✨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // SVG Icon Components
        const BarChart3 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const Settings2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        );
        const LayoutPanelLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="18" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>
        );
        const Sparkles = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const Loader2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`} style={{animation: 'spin 1s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );
        const Filter = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        // --- Custom CSV Parser ---
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return { header: [], data: [] };

            const splitLine = (line) => {
                const result = [];
                let cur = '';
                let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) {
                        result.push(cur.trim());
                        cur = '';
                    } else {
                        cur += char;
                    }
                }
                result.push(cur.trim());
                return result;
            };

            const rawHeader = splitLine(lines[0]);
            const headerCount = {};
            const header = rawHeader.map((h) => {
                const cleanH = h.trim() || 'Untitled';
                if (!headerCount[cleanH]) {
                    headerCount[cleanH] = 1;
                    return cleanH;
                } else {
                    headerCount[cleanH]++;
                    return `${cleanH} (${headerCount[cleanH]})`;
                }
            });

            const data = lines.slice(1)
                .filter(line => line.trim() !== '')
                .map(line => {
                    const values = splitLine(line);
                    const obj = {};
                    header.forEach((h, i) => {
                        obj[h] = values[i] || '';
                    });
                    return obj;
                });

            return { header, data };
        };

        const App = () => {
            const [data, setData] = React.useState([]);
            const [columns, setColumns] = React.useState([]);
            const [selectedY, setSelectedY] = React.useState('Total Cost');
            const [selectedX, setSelectedX] = React.useState('หัตถการ');
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            
            const [availableXValues, setAvailableXValues] = React.useState([]);
            const [selectedXValues, setSelectedXValues] = React.useState([]);

            const cleanNumber = (val) => {
                if (typeof val !== 'string') return val;
                const cleaned = val.replace(/,/g, '').trim();
                if (cleaned === '-' || cleaned === '') return null;
                const num = parseFloat(cleaned);
                return isNaN(num) ? null : num;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.name.toLowerCase().endsWith('.csv')) {
                    setError("กรุณาเลือกไฟล์นามสกุล .csv เท่านั้น");
                    return;
                }

                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const { header, data: rawData } = parseCSV(text);

                        if (rawData.length > 0) {
                            const processedData = rawData.map(row => {
                                const newRow = { ...row };
                                header.forEach(col => {
                                    const lowerCol = col.toLowerCase();
                                    if (
                                        lowerCol.includes('cost') || lowerCol.includes('bill') || 
                                        lowerCol.includes('ราคา') || lowerCol.includes('ค่าใช้จ่าย')
                                    ) {
                                        newRow[col] = cleanNumber(row[col]);
                                    }
                                });
                                return newRow;
                            });

                            setData(processedData);
                            setColumns(header);
                            
                            const hasTotalCost = header.find(h => h.includes('Total Cost'));
                            const hasProcedure = header.find(h => h.includes('หัตถการ'));
                            
                            if (hasTotalCost) setSelectedY(hasTotalCost);
                            if (hasProcedure) setSelectedX(hasProcedure);
                            else setSelectedX('none');
                        } else {
                            setError("ไม่พบข้อมูลในไฟล์ หรือรูปแบบไฟล์ไม่ถูกต้อง");
                        }
                    } catch (err) {
                        setError("เกิดข้อผิดพลาดในการประมวลผลไฟล์: " + err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            const downloadTemplate = () => {
                const headers = ["No", "Admit", "Discharge", "หัตถการ", "ราคาประเมิน", "ค่าใช้จ่ายจริง", "LOS", "Doctor", "Package", "Total Bill", "Total Cost", "Medicine", "Supply", "Lab", "Doctor Fee", "X-Ray", "Nutrition", "Other VC", "Fixed cost"];
                const sampleRow = ["1", "01/01/2024", "03/01/2024", "Example Procedure", "150000", "155000", "2", "Dr. Smith", "150000", "160000", "90000", "2000", "5000", "1000", "60000", "1500", "800", "0", "20000"];
                
                const csvContent = [headers.join(","), sampleRow.join(",")].join("\n");
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "cost_structure_template.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            React.useEffect(() => {
                if (data.length > 0 && selectedX !== 'none') {
                    const uniqueVals = Array.from(new Set(data.map(d => d[selectedX] || 'ไม่ระบุ')))
                        .filter(Boolean)
                        .sort();
                    setAvailableXValues(uniqueVals);
                    setSelectedXValues(uniqueVals);
                } else {
                    setAvailableXValues([]);
                    setSelectedXValues([]);
                }
            }, [data, selectedX]);

            const filteredData = React.useMemo(() => {
                if (!data.length) return [];
                if (!selectedX || selectedX === 'none') return data;
                return data.filter(row => selectedXValues.includes(row[selectedX] || 'ไม่ระบุ'));
            }, [data, selectedX, selectedXValues]);

            const stats = React.useMemo(() => {
                if (!filteredData.length || !selectedY) return null;
                const vals = filteredData.map(d => d[selectedY]).filter(v => typeof v === 'number');
                if (vals.length === 0) return null;
                const sorted = [...vals].sort((a, b) => a - b);
                const sum = sorted.reduce((a, b) => a + b, 0);
                return {
                    count: vals.length,
                    min: sorted[0],
                    max: sorted[sorted.length - 1],
                    avg: sum / vals.length,
                    median: sorted[Math.floor(sorted.length / 2)]
                };
            }, [filteredData, selectedY]);

            React.useEffect(() => {
                if (!filteredData.length || !selectedY || !window.Plotly) return;
                
                let traces = [];
                const customHoverTemplate = (
                    "<b>%{fullData.name}</b><br>" +
                    "Max: %{max:,.0f}<br>" +
                    "Q3: %{q3:,.0f}<br>" +
                    "Median: %{median:,.0f}<br>" +
                    "Q1: %{q1:,.0f}<br>" +
                    "Min: %{min:,.0f}<br>" +
                    "<extra></extra>"
                );

                if (!selectedX || selectedX === 'none') {
                    traces = [{
                        y: filteredData.map(d => d[selectedY]).filter(v => typeof v === 'number'),
                        type: 'box', 
                        name: 'ภาพรวม', 
                        marker: { color: '#3b82f6' }, 
                        boxpoints: 'all',
                        jitter: 0.3,
                        hovertemplate: customHoverTemplate
                    }];
                } else {
                    const groups = {};
                    filteredData.forEach(row => {
                        const groupName = row[selectedX] || 'ไม่ระบุ';
                        const val = row[selectedY];
                        if (typeof val === 'number') {
                            if (!groups[groupName]) groups[groupName] = [];
                            groups[groupName].push(val);
                        }
                    });
                    traces = Object.keys(groups).sort().map((group, index) => ({
                        y: groups[group], 
                        type: 'box', 
                        name: group,
                        marker: { color: `hsl(${(index * 137.5) % 360}, 70%, 50%)` },
                        boxpoints: 'outliers',
                        hovertemplate: customHoverTemplate
                    }));
                }

                window.Plotly.newPlot('my-plot', traces, {
                    title: { text: `การกระจายตัวของ ${selectedY}`, font: { size: 16 } },
                    margin: { t: 80, b: 120, l: 80, r: 20 },
                    yaxis: { tickformat: ',.0f', title: 'จำนวนเงิน' },
                    xaxis: { tickangle: -45, automargin: true },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                }, { responsive: true, displayModeBar: false });
            }, [filteredData, selectedX, selectedY]);

            const toggleValue = (val) => {
                setSelectedXValues(prev => 
                    prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg">
                                    <BarChart3 size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                                        Cost Structure <Sparkles size={20} className="text-amber-400" />
                                    </h1>
                                    <p className="text-slate-500 text-sm">เครื่องมือวิเคราะห์และบริหารจัดการโครงสร้างต้นทุน</p>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button 
                                    onClick={downloadTemplate}
                                    className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all active:scale-95"
                                >
                                    <Download size={18} />
                                    <span>ดาวน์โหลดเทมเพลต</span>
                                </button>
                                <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 shadow-md transition-all active:scale-95">
                                    <FileText size={18} />
                                    <span>อัปโหลดข้อมูล (.csv)</span>
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        </header>

                        {data.length === 0 && !loading && (
                            <div className="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-24 text-center space-y-5 shadow-sm">
                                <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-slate-300">
                                    <FileText size={48} />
                                </div>
                                <div className="space-y-2">
                                    <h3 className="text-xl font-bold text-slate-700">พร้อมเริ่มต้นวิเคราะห์</h3>
                                    <p className="text-slate-400 max-w-xs mx-auto leading-relaxed">อัปโหลดไฟล์ <span className="font-bold text-blue-600">นามสกุล .csv</span> เพื่อเริ่มวิเคราะห์โครงสร้างต้นทุนและสถิติเชิงลึกได้ทันที</p>
                                    <p className="text-[11px] text-slate-300 uppercase tracking-widest font-bold">Supports .CSV Files Only</p>
                                </div>
                            </div>
                        )}

                        {loading && (
                            <div className="flex flex-col items-center justify-center py-24 gap-4 bg-white rounded-3xl border border-slate-200 shadow-sm">
                                <Loader2 size={48} className="text-blue-600" />
                                <p className="text-slate-500 font-medium">กำลังประมวลผลข้อมูลโครงสร้างต้นทุน...</p>
                            </div>
                        )}

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-center gap-3">
                                <Info size={18} />
                                <span>{error}</span>
                            </div>
                        )}

                        {data.length > 0 && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-3 space-y-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-5">
                                        <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3">
                                            <Settings2 size={18} className="text-blue-600" />
                                            <span>ตั้งค่าการวิเคราะห์</span>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ข้อมูลต้นทุน (Y)</label>
                                            <select value={selectedY} onChange={(e) => setSelectedY(e.target.value)} className="w-full bg-slate-50 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                                {columns.map((col, idx) => <option key={`y-${idx}`} value={col}>{col}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">จัดกลุ่มตาม (X)</label>
                                            <select value={selectedX} onChange={(e) => setSelectedX(e.target.value)} className="w-full bg-slate-50 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                                <option value="none">-- ภาพรวมทั้งหมด --</option>
                                                {columns.map((col, idx) => <option key={`x-${idx}`} value={col}>{col}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {selectedX !== 'none' && availableXValues.length > 0 && (
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                            <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3">
                                                <Filter size={18} className="text-indigo-600" />
                                                <span>กรองข้อมูล {selectedX}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setSelectedXValues(availableXValues)} className="text-[10px] bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded font-bold text-slate-600">ทั้งหมด</button>
                                                <button onClick={() => setSelectedXValues([])} className="text-[10px] bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded font-bold text-slate-600">ล้างค่า</button>
                                            </div>
                                            <div className="max-h-60 overflow-y-auto pr-1 space-y-1 custom-scrollbar">
                                                {availableXValues.map((val) => (
                                                    <label 
                                                        key={val} 
                                                        className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors group"
                                                        onClick={() => toggleValue(val)}
                                                    >
                                                        <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${selectedXValues.includes(val) ? 'bg-blue-600 border-blue-600' : 'border-slate-300 group-hover:border-slate-400'}`}>
                                                            {selectedXValues.includes(val) && <span className="text-[10px] text-white">✓</span>}
                                                        </div>
                                                        <span className={`text-xs ${selectedXValues.includes(val) ? 'text-slate-900 font-medium' : 'text-slate-400'}`}>
                                                            {val}
                                                        </span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {stats && (
                                        <div className="bg-slate-900 text-white p-6 rounded-2xl shadow-xl space-y-5">
                                            <div className="flex items-center gap-2 font-bold border-b border-white/10 pb-3">
                                                <LayoutPanelLeft size={18} className="text-blue-400" />
                                                <span>สรุปผลสถิติ</span>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                    <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">เฉลี่ย (Mean)</p>
                                                    <p className="text-2xl font-black text-blue-400">฿{stats.avg.toLocaleString(undefined, {maximumFractionDigits: 0})}</p>
                                                </div>
                                                <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                    <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">มัธยฐาน (Median)</p>
                                                    <p className="text-2xl font-black text-white">฿{stats.median.toLocaleString()}</p>
                                                </div>
                                                <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                    <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">จำนวนรายการ</p>
                                                    <p className="text-2xl font-black text-slate-300">{stats.count.toLocaleString()}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="lg:col-span-9 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 min-h-[600px] flex flex-col relative overflow-hidden">
                                    {filteredData.length > 0 ? (
                                        <div id="my-plot" className="flex-1 w-full h-full min-h-[500px]"></div>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center text-slate-400 space-y-3">
                                            <Filter size={48} className="opacity-10" />
                                            <p className="text-sm font-medium">กรุณาเลือกรายการในตัวกรองเพื่อแสดงข้อมูล</p>
                                        </div>
                                    )}
                                    <div className="mt-4 pt-4 border-t border-slate-50 text-[10px] text-slate-400 flex justify-between items-center px-2">
                                        <span className="italic flex items-center gap-1">
                                            วิเคราะห์ความแปรปรวนของ {selectedY} ({filteredData.length} จาก {data.length} รายการ)
                                        </span>
                                        <span className="font-bold text-slate-300 uppercase tracking-widest text-[9px]">Structure Analysis Platform</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
