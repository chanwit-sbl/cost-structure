<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Structure ✨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .table-container {
            max-height: 600px;
            overflow: auto;
        }
        
        table thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // SVG Icon Components
        const BarChart3 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const Settings2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        );
        const LayoutPanelLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="18" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>
        );
        const Sparkles = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const Loader2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`} style={{animation: 'spin 1s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );
        const FilterIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const TableIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3v18"/><path d="M3 12h18"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
        );

        // --- Helper for Quantile Calculation ---
        const getQuantile = (data, q) => {
            if (data.length === 0) return 0;
            const pos = (data.length - 1) * q;
            const base = Math.floor(pos);
            const rest = pos - base;
            if (data[base + 1] !== undefined) {
                return data[base] + rest * (data[base + 1] - data[base]);
            } else {
                return data[base];
            }
        };

        // --- Custom CSV Parser ---
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return { header: [], data: [] };

            const splitLine = (line) => {
                const result = [];
                let cur = '';
                let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) {
                        result.push(cur.trim());
                        cur = '';
                    } else {
                        cur += char;
                    }
                }
                result.push(cur.trim());
                return result;
            };

            const rawHeader = splitLine(lines[0]);
            const headerCount = {};
            const header = rawHeader.map((h) => {
                const cleanH = h.trim() || 'Untitled';
                if (!headerCount[cleanH]) {
                    headerCount[cleanH] = 1;
                    return cleanH;
                } else {
                    headerCount[cleanH]++;
                    return `${cleanH} (${headerCount[cleanH]})`;
                }
            });

            const data = lines.slice(1)
                .filter(line => line.trim() !== '')
                .map(line => {
                    const values = splitLine(line);
                    const obj = {};
                    header.forEach((h, i) => {
                        obj[h] = values[i] || '';
                    });
                    return obj;
                });

            return { header, data };
        };

        const App = () => {
            const [data, setData] = React.useState([]);
            const [numericColumns, setNumericColumns] = React.useState([]);
            const [selectedY, setSelectedY] = React.useState('Total Cost');
            const fixedX = 'หัตถการ'; 
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            
            const [availableXValues, setAvailableXValues] = React.useState([]);
            const [selectedXValues, setSelectedXValues] = React.useState([]);

            // STRICT allowed headers list
            const allowedHeadersList = [
                'Total Bill', 'Total Cost', 'Medicine', 'Supply', 'Lab',
                'Doctor Fee', 'X-Ray', 'Nutrition', 'Other VC', 'Fixed cost'
            ];

            const cleanNumber = (val) => {
                if (typeof val !== 'string') return val;
                const cleaned = val.replace(/,/g, '').trim();
                if (cleaned === '-' || cleaned === '') return null;
                const num = parseFloat(cleaned);
                return isNaN(num) ? null : num;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.name.toLowerCase().endsWith('.csv')) {
                    setError("กรุณาเลือกไฟล์นามสกุล .csv เท่านั้น");
                    return;
                }

                setLoading(true);
                setError(null);

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const { header, data: rawData } = parseCSV(text);

                        if (rawData.length > 0) {
                            // Find actual column names in the CSV that match our strict list (case-insensitive, trimming whitespace)
                            const matchedHeaders = allowedHeadersList.map(target => {
                                return header.find(h => h.trim().toLowerCase() === target.toLowerCase()) || null;
                            }).filter(h => h !== null);

                            if (matchedHeaders.length === 0) {
                                setError("ไม่พบคอลัมน์ที่ต้องการในไฟล์ (เช่น Total Cost, Total Bill, ฯลฯ)");
                                setLoading(false);
                                return;
                            }

                            const processedData = rawData.map(row => {
                                const newRow = { ...row };
                                matchedHeaders.forEach(col => {
                                    newRow[col] = cleanNumber(row[col]);
                                });
                                return newRow;
                            });

                            setData(processedData);
                            setNumericColumns(matchedHeaders);
                            
                            // Auto-select Total Cost if available
                            const defaultY = matchedHeaders.find(h => h.trim().toLowerCase() === 'total cost') || matchedHeaders[0];
                            setSelectedY(defaultY);
                            
                            const uniqueProcs = Array.from(new Set(processedData.map(d => d[fixedX] || 'ไม่ระบุ')))
                                .filter(Boolean)
                                .sort();
                            setAvailableXValues(uniqueProcs);
                            setSelectedXValues(uniqueProcs);
                        } else {
                            setError("ไม่พบข้อมูลในไฟล์ หรือรูปแบบไฟล์ไม่ถูกต้อง");
                        }
                    } catch (err) {
                        setError("เกิดข้อผิดพลาดในการประมวลผลไฟล์: " + err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            const downloadTemplate = () => {
                const headers = ["No", "Admit", "Discharge", "หัตถการ", "ราคาประเมิน", "ค่าใช้จ่ายจริง", "LOS", "Doctor", "Package", "Total Bill", "Total Cost", "Medicine", "Supply", "Lab", "Doctor Fee", "X-Ray", "Nutrition", "Other VC", "Fixed cost"];
                const sampleRow = ["1", "01/01/2024", "03/01/2024", "LC", "150000", "155000", "2", "Dr. A", "150000", "160000", "90000", "2000", "5000", "1000", "60000", "1500", "800", "0", "20000"];
                
                const csvContent = [headers.join(","), sampleRow.join(",")].join("\n");
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "cost_structure_template.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const filteredData = React.useMemo(() => {
                if (!data.length) return [];
                return data.filter(row => selectedXValues.includes(row[fixedX] || 'ไม่ระบุ'));
            }, [data, selectedXValues]);

            const summaryData = React.useMemo(() => {
                if (!filteredData.length || !selectedY) return [];
                
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[fixedX] || 'ไม่ระบุ';
                    const val = row[selectedY];
                    if (typeof val === 'number') {
                        if (!groups[groupName]) groups[groupName] = [];
                        groups[groupName].push(val);
                    }
                });

                return Object.keys(groups).sort().map(group => {
                    const vals = [...groups[group]].sort((a, b) => a - b);
                    const count = vals.length;
                    const min = vals[0];
                    const max = vals[count - 1];
                    const sum = vals.reduce((a, b) => a + b, 0);
                    const avg = sum / count;
                    
                    return {
                        procedure: group,
                        count: count,
                        min: min,
                        q1: getQuantile(vals, 0.25),
                        median: getQuantile(vals, 0.5),
                        q3: getQuantile(vals, 0.75),
                        max: max,
                        avg: avg
                    };
                });
            }, [filteredData, selectedY]);

            const globalStats = React.useMemo(() => {
                if (!filteredData.length || !selectedY) return null;
                const vals = filteredData.map(d => d[selectedY]).filter(v => typeof v === 'number');
                if (vals.length === 0) return null;
                const sorted = [...vals].sort((a, b) => a - b);
                const sum = sorted.reduce((a, b) => a + b, 0);
                return {
                    count: vals.length,
                    avg: sum / vals.length,
                    median: sorted[Math.floor(sorted.length / 2)]
                };
            }, [filteredData, selectedY]);

            React.useEffect(() => {
                if (!filteredData.length || !selectedY || !window.Plotly) return;
                
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[fixedX] || 'ไม่ระบุ';
                    const val = row[selectedY];
                    if (typeof val === 'number') {
                        if (!groups[groupName]) groups[groupName] = [];
                        groups[groupName].push(val);
                    }
                });

                const customHoverTemplate = (
                    "<b>%{fullData.name}</b><br>" +
                    "Max: %{max:,.0f}<br>" +
                    "Q3: %{q3:,.0f}<br>" +
                    "Median: %{median:,.0f}<br>" +
                    "Q1: %{q1:,.0f}<br>" +
                    "Min: %{min:,.0f}<br>" +
                    "<extra></extra>"
                );

                const traces = Object.keys(groups).sort().map((group, index) => ({
                    y: groups[group], 
                    type: 'box', 
                    name: group,
                    marker: { color: `hsl(${(index * 137.5) % 360}, 70%, 50%)` },
                    boxpoints: 'outliers',
                    hovertemplate: customHoverTemplate
                }));

                window.Plotly.newPlot('my-plot', traces, {
                    title: { text: `การกระจายตัวของ ${selectedY}`, font: { size: 16 } },
                    margin: { t: 80, b: 120, l: 80, r: 20 },
                    yaxis: { tickformat: ',.0f', title: 'จำนวนเงิน' },
                    xaxis: { tickangle: -45, automargin: true },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                }, { responsive: true, displayModeBar: false });
            }, [filteredData, selectedY]);

            const toggleValue = (val) => {
                setSelectedXValues(prev => 
                    prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]
                );
            };

            const formatCurrency = (val) => {
                if (val === undefined || val === null) return '-';
                return val.toLocaleString(undefined, { maximumFractionDigits: 0 });
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg">
                                    <BarChart3 size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                                        Cost Structure <Sparkles size={20} className="text-amber-400" />
                                    </h1>
                                    <p className="text-slate-500 text-sm">วิเคราะห์โครงสร้างต้นทุนเปรียบเทียบตามหัตถการ</p>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button 
                                    onClick={downloadTemplate}
                                    className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all active:scale-95"
                                >
                                    <Download size={18} />
                                    <span>ดาวน์โหลดเทมเพลต</span>
                                </button>
                                <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 shadow-md transition-all active:scale-95">
                                    <FileText size={18} />
                                    <span>อัปโหลดข้อมูล (.csv)</span>
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        </header>

                        {data.length === 0 && !loading && (
                            <div className="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-24 text-center space-y-5 shadow-sm">
                                <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto text-slate-300">
                                    <FileText size={48} />
                                </div>
                                <div className="space-y-2">
                                    <h3 className="text-xl font-bold text-slate-700">พร้อมเริ่มต้นวิเคราะห์</h3>
                                    <p className="text-slate-400 max-w-xs mx-auto leading-relaxed">อัปโหลดไฟล์ <span className="font-bold text-blue-600">นามสกุล .csv</span> เพื่อเริ่มเปรียบเทียบสถิติหัตถการ</p>
                                </div>
                            </div>
                        )}

                        {loading && (
                            <div className="flex flex-col items-center justify-center py-24 gap-4 bg-white rounded-3xl border border-slate-200 shadow-sm">
                                <Loader2 size={48} className="text-blue-600" />
                                <p className="text-slate-500 font-medium">กำลังประมวลผลข้อมูลสถิติ...</p>
                            </div>
                        )}

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-center gap-3 font-medium">
                                <Info size={18} />
                                <span>{error}</span>
                            </div>
                        )}

                        {data.length > 0 && (
                            <>
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    <div className="lg:col-span-3 space-y-6">
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-5">
                                            <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3">
                                                <Settings2 size={18} className="text-blue-600" />
                                                <span>ข้อมูลที่วิเคราะห์</span>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">เลือกตัวแปรต้นทุน (Y)</label>
                                                <select value={selectedY} onChange={(e) => setSelectedY(e.target.value)} className="w-full bg-slate-50 border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer font-medium">
                                                    {numericColumns.map((col, idx) => <option key={`y-${idx}`} value={col}>{col}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        {availableXValues.length > 0 && (
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                                <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3">
                                                    <FilterIcon size={18} className="text-indigo-600" />
                                                    <span>เลือกหัตถการ</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setSelectedXValues(availableXValues)} className="text-[10px] bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded font-bold text-slate-600">ทั้งหมด</button>
                                                    <button onClick={() => setSelectedXValues([])} className="text-[10px] bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded font-bold text-slate-600">ล้างค่า</button>
                                                </div>
                                                <div className="max-h-60 overflow-y-auto pr-1 space-y-1 custom-scrollbar">
                                                    {availableXValues.map((val) => (
                                                        <label 
                                                            key={val} 
                                                            className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors group"
                                                            onClick={() => toggleValue(val)}
                                                        >
                                                            <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${selectedXValues.includes(val) ? 'bg-blue-600 border-blue-600' : 'border-slate-300 group-hover:border-slate-400'}`}>
                                                                {selectedXValues.includes(val) && <span className="text-[10px] text-white">✓</span>}
                                                            </div>
                                                            <span className={`text-xs ${selectedXValues.includes(val) ? 'text-slate-900 font-medium' : 'text-slate-400'}`}>
                                                                {val}
                                                            </span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {globalStats && (
                                            <div className="bg-slate-900 text-white p-6 rounded-2xl shadow-xl space-y-5">
                                                <div className="flex items-center gap-2 font-bold border-b border-white/10 pb-3">
                                                    <LayoutPanelLeft size={18} className="text-blue-400" />
                                                    <span>สถิติรวมกลุ่มที่เลือก</span>
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                        <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">เฉลี่ยรวม</p>
                                                        <p className="text-2xl font-black text-blue-400">฿{globalStats.avg.toLocaleString(undefined, {maximumFractionDigits: 0})}</p>
                                                    </div>
                                                    <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                        <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">มัธยฐานรวม</p>
                                                        <p className="text-2xl font-black text-white">฿{globalStats.median.toLocaleString()}</p>
                                                    </div>
                                                    <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                        <p className="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">จำนวนเคส</p>
                                                        <p className="text-2xl font-black text-slate-300">{globalStats.count.toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="lg:col-span-9 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 min-h-[500px] flex flex-col relative overflow-hidden">
                                        {filteredData.length > 0 ? (
                                            <div id="my-plot" className="flex-1 w-full h-full min-h-[400px]"></div>
                                        ) : (
                                            <div className="flex-1 flex flex-col items-center justify-center text-slate-400 space-y-3">
                                                <FilterIcon size={48} className="opacity-10" />
                                                <p className="text-sm font-medium">กรุณาเลือกหัตถการในตัวกรองเพื่อแสดง Boxplot</p>
                                            </div>
                                        )}
                                        <div className="mt-4 pt-4 border-t border-slate-50 text-[10px] text-slate-400 flex justify-between items-center px-2 font-medium">
                                            <span className="italic flex items-center gap-1">
                                                เปรียบเทียบค่าสถิติ 5 ตัว (Min, Q1, Median, Q3, Max)
                                            </span>
                                            <span className="bg-slate-50 px-2 py-1 rounded text-blue-500 uppercase tracking-widest text-[8px]">Grouped Statistic View</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Summary Statistics Table */}
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col space-y-5">
                                    <div className="flex items-center justify-between border-b pb-4">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-indigo-100 p-2.5 rounded-xl text-indigo-600">
                                                <TableIcon size={22} />
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-bold text-slate-800 tracking-tight">ตารางสถิติสรุปค่า {selectedY}</h2>
                                                <p className="text-xs text-slate-400 font-medium">ตารางสรุปตัวเลขสถิติพื้นฐานแยกตามรายหัตถการ</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="table-container custom-scrollbar border rounded-2xl overflow-hidden shadow-sm">
                                        <table className="w-full text-left text-sm border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="px-5 py-4 font-bold text-indigo-700 text-xs uppercase tracking-wider border-b whitespace-nowrap">หัตถการ</th>
                                                    <th className="px-5 py-4 font-bold text-slate-600 text-xs uppercase tracking-wider border-b text-center whitespace-nowrap">Count</th>
                                                    <th className="px-5 py-4 font-bold text-slate-600 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap">Min</th>
                                                    <th className="px-5 py-4 font-bold text-slate-600 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap">Q1</th>
                                                    <th className="px-5 py-4 font-bold text-blue-700 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap bg-blue-50/30">Median</th>
                                                    <th className="px-5 py-4 font-bold text-slate-600 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap">Q3</th>
                                                    <th className="px-5 py-4 font-bold text-slate-600 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap">Max</th>
                                                    <th className="px-5 py-4 font-bold text-emerald-700 text-xs uppercase tracking-wider border-b text-right whitespace-nowrap bg-emerald-50/20">Mean</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {summaryData.length > 0 ? (
                                                    summaryData.map((row, rowIdx) => (
                                                        <tr key={`summary-${rowIdx}`} className="hover:bg-slate-50 transition-colors border-b last:border-0 group">
                                                            <td className="px-5 py-4 font-bold text-slate-800 text-xs whitespace-nowrap group-hover:text-indigo-600">{row.procedure}</td>
                                                            <td className="px-5 py-4 text-slate-500 text-xs text-center whitespace-nowrap">{row.count}</td>
                                                            <td className="px-5 py-4 text-slate-500 text-xs text-right whitespace-nowrap font-mono">{formatCurrency(row.min)}</td>
                                                            <td className="px-5 py-4 text-slate-500 text-xs text-right whitespace-nowrap font-mono">{formatCurrency(row.q1)}</td>
                                                            <td className="px-5 py-4 font-bold text-blue-600 text-xs text-right whitespace-nowrap bg-blue-50/10 font-mono">{formatCurrency(row.median)}</td>
                                                            <td className="px-5 py-4 text-slate-500 text-xs text-right whitespace-nowrap font-mono">{formatCurrency(row.q3)}</td>
                                                            <td className="px-5 py-4 text-slate-500 text-xs text-right whitespace-nowrap font-mono">{formatCurrency(row.max)}</td>
                                                            <td className="px-5 py-4 font-bold text-emerald-600 text-xs text-right whitespace-nowrap bg-emerald-50/10 font-mono">{formatCurrency(row.avg)}</td>
                                                        </tr>
                                                    ))
                                                ) : (
                                                    <tr>
                                                        <td colSpan="8" className="py-12 text-center text-slate-400 text-sm italic">
                                                            กรุณาอัปโหลดไฟล์ที่ถูกต้องเพื่อแสดงผลสถิติ
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
