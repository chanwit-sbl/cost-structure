<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Structure ✨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .table-container {
            max-height: 600px;
            overflow: auto;
        }
        
        table thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // SVG Icons
        const BarChart3 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const Settings2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
        );
        const LayoutPanelLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="18" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>
        );
        const Sparkles = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const Loader2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`} style={{animation: 'spin 1s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const TableIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3v18"/><path d="M3 12h18"/><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
        );
        const FilterIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        );

        // Help Calculation
        const getQuantile = (data, q) => {
            if (!data || data.length === 0) return 0;
            const pos = (data.length - 1) * q;
            const base = Math.floor(pos);
            const rest = pos - base;
            if (data[base + 1] !== undefined) {
                return data[base] + rest * (data[base + 1] - data[base]);
            } else {
                return data[base];
            }
        };

        // CSV Parser
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return { header: [], data: [] };
            const splitLine = (line) => {
                const result = [];
                let cur = '';
                let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) {
                        result.push(cur.trim());
                        cur = '';
                    } else {
                        cur += char;
                    }
                }
                result.push(cur.trim());
                return result;
            };
            const rawHeader = splitLine(lines[0]);
            const header = rawHeader.map(h => h.trim() || 'Untitled');
            const data = lines.slice(1)
                .filter(line => line.trim() !== '')
                .map(line => {
                    const values = splitLine(line);
                    const obj = {};
                    header.forEach((h, i) => {
                        obj[h] = values[i] || '';
                    });
                    return obj;
                });
            return { header, data };
        };

        const App = () => {
            const [data, setData] = React.useState([]);
            const [numericColumns, setNumericColumns] = React.useState([]);
            const [selectedY, setSelectedY] = React.useState('');
            const [actualProcedureCol, setActualProcedureCol] = React.useState('หัตถการ');
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            const [availableXValues, setAvailableXValues] = React.useState([]);
            const [selectedXValues, setSelectedXValues] = React.useState([]);

            const allowedHeadersList = [
                'Total Bill', 'Total Cost', 'Medicine', 'Supply', 'Lab',
                'Doctor Fee', 'X-Ray', 'Nutrition', 'Other VC', 'Fixed cost'
            ];

            const cleanNumber = (val) => {
                if (typeof val !== 'string') return typeof val === 'number' ? val : 0;
                const cleaned = val.replace(/,/g, '').trim();
                // REVERT: กลับไปใช้ Logic เดิมที่เปลี่ยน - เป็น 0 ตามคำขอ
                if (cleaned === '-' || cleaned === '') return 0;
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setError(null);
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const { header, data: rawData } = parseCSV(text);
                        if (rawData.length > 0) {
                            // Find actual column names in the CSV
                            const matchedHeaders = allowedHeadersList.map(target => {
                                return header.find(h => h.toLowerCase() === target.toLowerCase()) || null;
                            }).filter(h => h !== null);

                            const procCol = header.find(h => h.includes('หัตถการ')) || 'หัตถการ';
                            setActualProcedureCol(procCol);

                            if (matchedHeaders.length === 0) {
                                setError("ไม่พบคอลัมน์ข้อมูลต้นทุนที่ต้องการ กรุณาตรวจสอบหัวตาราง");
                                setLoading(false);
                                return;
                            }

                            const processedData = rawData.map(row => {
                                const newRow = { ...row };
                                matchedHeaders.forEach(col => {
                                    newRow[col] = cleanNumber(row[col]);
                                });
                                return newRow;
                            });

                            setData(processedData);
                            setNumericColumns(matchedHeaders);
                            
                            const defaultY = matchedHeaders.find(h => h.toLowerCase() === 'total cost') || matchedHeaders[0];
                            setSelectedY(defaultY);

                            const uniqueProcs = Array.from(new Set(processedData.map(d => d[procCol] ? d[procCol].trim() : 'ไม่ระบุ')))
                                .filter(Boolean)
                                .sort();
                            setAvailableXValues(uniqueProcs);
                            setSelectedXValues(uniqueProcs);
                        }
                    } catch (err) {
                        setError("เกิดข้อผิดพลาดในการอ่านไฟล์");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            const downloadTemplate = () => {
                const headers = ["No", "หัตถการ", "Total Bill", "Total Cost", "Medicine", "Supply", "Lab", "Doctor Fee", "X-Ray", "Nutrition", "Other VC", "Fixed cost"];
                const sampleRow = ["1", "Endospine Non-Package", "200000", "150000", "5000", "10000", "2000", "50000", "1500", "800", "1200", "79500"];
                const csvContent = [headers.join(","), sampleRow.join(",")].join("\n");
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "template.csv");
                link.click();
            };

            const filteredData = React.useMemo(() => {
                if (!data.length) return [];
                return data.filter(row => {
                    const val = row[actualProcedureCol] ? row[actualProcedureCol].trim() : 'ไม่ระบุ';
                    return selectedXValues.includes(val);
                });
            }, [data, selectedXValues, actualProcedureCol]);

            const summaryData = React.useMemo(() => {
                if (!filteredData.length || !selectedY) return [];
                
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[actualProcedureCol] ? row[actualProcedureCol].trim() : 'ไม่ระบุ';
                    const val = row[selectedY]; 
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(val);
                });

                return Object.keys(groups).sort().map(group => {
                    const vals = [...groups[group]].sort((a, b) => a - b);
                    const count = vals.length;
                    const sum = vals.reduce((a, b) => a + b, 0);
                    
                    return {
                        procedure: group,
                        count: count,
                        min: vals[0],
                        q1: getQuantile(vals, 0.25),
                        median: getQuantile(vals, 0.5),
                        q3: getQuantile(vals, 0.75),
                        max: vals[count - 1],
                        avg: sum / count
                    };
                });
            }, [filteredData, selectedY, actualProcedureCol]);

            const globalStats = React.useMemo(() => {
                if (!filteredData.length || !selectedY) return null;
                const vals = filteredData.map(d => d[selectedY]);
                const sum = vals.reduce((a, b) => a + b, 0);
                return {
                    count: vals.length,
                    avg: sum / vals.length
                };
            }, [filteredData, selectedY]);

            React.useEffect(() => {
                if (!filteredData.length || !selectedY || !window.Plotly) return;
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[actualProcedureCol] ? row[actualProcedureCol].trim() : 'ไม่ระบุ';
                    const val = row[selectedY];
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(val);
                });

                const traces = Object.keys(groups).sort().map((group, index) => ({
                    y: groups[group], 
                    type: 'box', 
                    name: group,
                    marker: { color: `hsl(${(index * 137.5) % 360}, 70%, 50%)` },
                    boxpoints: 'outliers',
                    hovertemplate: "<b>%{fullData.name}</b><br>Max: %{max:,.2f}<br>Median: %{median:,.2f}<br>Min: %{min:,.2f}<extra></extra>"
                }));

                window.Plotly.newPlot('my-plot', traces, {
                    title: { text: `การกระจายตัวของ: ${selectedY}`, font: { size: 16 } },
                    margin: { t: 80, b: 120, l: 80, r: 20 },
                    yaxis: { tickformat: ',.0f', title: 'บาท' },
                    xaxis: { tickangle: -45, automargin: true },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                }, { responsive: true, displayModeBar: false });
            }, [filteredData, selectedY, actualProcedureCol]);

            const formatCurrency = (val) => {
                return val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const toggleX = (val) => {
                setSelectedXValues(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg">
                                    <BarChart3 size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800 tracking-tight flex items-center gap-2">
                                        Cost Structure <Sparkles size={20} className="text-amber-400" />
                                    </h1>
                                    <p className="text-slate-500 text-sm">วิเคราะห์โครงสร้างต้นทุนและสถิติหัตถการ</p>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={downloadTemplate} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all active:scale-95">
                                    <Download size={18} />
                                    <span>เทมเพลต</span>
                                </button>
                                <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 shadow-md transition-all active:scale-95">
                                    <FileText size={18} />
                                    <span>อัปโหลด CSV</span>
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                            </div>
                        </header>

                        {data.length > 0 && (
                            <>
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                    <div className="lg:col-span-3 space-y-6">
                                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-5">
                                            <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3 text-sm">
                                                <Settings2 size={16} className="text-blue-600" />
                                                <span>ข้อมูลที่เลือกดู</span>
                                            </div>
                                            <select value={selectedY} onChange={(e) => setSelectedY(e.target.value)} className="w-full bg-blue-50 border-2 border-blue-100 rounded-xl p-3 text-sm font-bold text-blue-700 outline-none cursor-pointer">
                                                {numericColumns.map((col, idx) => <option key={`y-${idx}`} value={col}>{col}</option>)}
                                            </select>
                                        </div>

                                        {/* Filter Section - Re-added here */}
                                        {availableXValues.length > 0 && (
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                                                <div className="flex items-center gap-2 font-bold text-slate-800 border-b pb-3 text-sm text-indigo-600">
                                                    <FilterIcon size={16} />
                                                    <span>ตัวกรองหัตถการ</span>
                                                </div>
                                                <div className="max-h-60 overflow-y-auto pr-1 space-y-1 custom-scrollbar">
                                                    {availableXValues.map((val) => (
                                                        <label key={val} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-lg cursor-pointer group" onClick={() => toggleX(val)}>
                                                            <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${selectedXValues.includes(val) ? 'bg-blue-600 border-blue-600' : 'border-slate-300 group-hover:border-slate-400'}`}>
                                                                {selectedXValues.includes(val) && <span className="text-[10px] text-white">✓</span>}
                                                            </div>
                                                            <span className={`text-xs ${selectedXValues.includes(val) ? 'text-slate-900 font-bold' : 'text-slate-400'}`}>{val}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="bg-slate-900 text-white p-6 rounded-2xl shadow-xl space-y-4">
                                            <div className="flex items-center gap-2 font-bold border-b border-white/10 pb-3 text-xs uppercase tracking-wider text-blue-400">
                                                <LayoutPanelLeft size={16} />
                                                <span>สรุปผลรวมที่เลือก</span>
                                            </div>
                                            {globalStats && (
                                                <div className="space-y-4">
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-black">เฉลี่ยรวม</p>
                                                        <p className="text-xl font-bold text-blue-600">฿{globalStats.avg.toLocaleString(undefined, {maximumFractionDigits: 0})}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-black">เคสทั้งหมด</p>
                                                        <p className="text-xl font-bold text-slate-300">{globalStats.count}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="lg:col-span-9 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 min-h-[500px] flex flex-col relative overflow-hidden">
                                        <div id="my-plot" className="flex-1 w-full h-full min-h-[400px]"></div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col space-y-5 shadow-lg overflow-hidden">
                                    <div className="flex items-center gap-3 border-b pb-4">
                                        <div className="bg-indigo-100 p-2.5 rounded-xl text-indigo-600">
                                            <TableIcon size={22} />
                                        </div>
                                        <h2 className="text-xl font-black text-slate-800 tracking-tight">ตารางสรุปสถิติ: {selectedY}</h2>
                                    </div>

                                    <div className="table-container custom-scrollbar border-2 border-slate-100 rounded-2xl overflow-hidden">
                                        <table className="w-full text-left text-sm border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="px-5 py-5 font-black text-slate-800 text-xs uppercase border-b whitespace-nowrap">หัตถการ</th>
                                                    <th className="px-5 py-5 font-bold text-slate-400 text-xs uppercase border-b text-center">จำนวนเคส</th>
                                                    <th className="px-5 py-5 font-black text-emerald-700 text-xs uppercase border-b text-right bg-emerald-50/30">เฉลี่ย (Mean)</th>
                                                    <th className="px-5 py-5 font-bold text-slate-600 text-xs uppercase border-b text-right">มัธยฐาน (Median)</th>
                                                    <th className="px-5 py-5 font-bold text-slate-400 text-xs uppercase border-b text-right">ต่ำสุด (Min)</th>
                                                    <th className="px-5 py-5 font-bold text-slate-400 text-xs uppercase border-b text-right">สูงสุด (Max)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {summaryData.map((row, rowIdx) => (
                                                    <tr key={`summary-${rowIdx}`} className="hover:bg-blue-50/50 transition-colors border-b last:border-0 group">
                                                        <td className="px-5 py-4 font-bold text-slate-800 text-xs whitespace-nowrap group-hover:text-blue-600">{row.procedure}</td>
                                                        <td className="px-5 py-4 text-slate-700 text-xs text-center font-bold">{row.count}</td>
                                                        <td className="px-5 py-4 font-black text-emerald-600 text-xs text-right font-mono bg-emerald-50/20">{formatCurrency(row.avg)}</td>
                                                        <td className="px-5 py-4 font-bold text-slate-600 text-xs text-right font-mono">{formatCurrency(row.median)}</td>
                                                        <td className="px-5 py-4 text-slate-400 text-xs text-right font-mono">{formatCurrency(row.min)}</td>
                                                        <td className="px-5 py-4 text-slate-400 text-xs text-right font-mono">{formatCurrency(row.max)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
